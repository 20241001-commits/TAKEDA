<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝探しレーダー</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            color: white;
            transition: background-color 0.5s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
        }
        #start-screen, #game-screen {
            padding: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .data-box {
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 10px;
            margin: 20px auto;
            width: 80%;
            max-width: 300px;
        }
        .big-text {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }
        /* 宝の方向を向いた時の背景色 */
        .found-direction {
            background-color: #f1c40f !important; /* ゴールド */
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>宝探しスタート</h2>
        <p>位置情報とコンパスを使用します</p>
        <button id="start-btn">ゲーム開始</button>
    </div>

    <div id="game-screen" style="display: none;">
        <h2>宝探しレーダー</h2>
        <div id="message" class="big-text">宝の方向を探せ！</div>
        
        <div class="data-box">
            <p>宝までの距離</p>
            <div id="distance-display" class="big-text">-- m</div>
        </div>

        <div class="data-box">
            <p>デバッグ情報</p>
            <small>スマホの向き: <span id="heading-display">--</span>°</small><br>
            <small>宝の方向: <span id="target-bearing-display">--</span>°</small>
        </div>
    </div>

    <script>
        // 宝の座標（ご指定の座標）
        const TREASURE_LAT = 35.6263;
        const TREASURE_LNG = 139.6338;

        // 状態を保持する変数
        let currentLat = null;
        let currentLng = null;
        let targetBearing = 0;

        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const distanceDisplay = document.getElementById('distance-display');
        const headingDisplay = document.getElementById('heading-display');
        const targetBearingDisplay = document.getElementById('target-bearing-display');
        const messageDisplay = document.getElementById('message');

        startBtn.addEventListener('click', async () => {
            // iOS 13+ の DeviceOrientation API 許可リクエスト
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState !== 'granted') {
                        alert('コンパスの使用が許可されませんでした。');
                        return;
                    }
                } catch (error) {
                    console.error(error);
                }
            }

            // 画面切り替え
            startScreen.style.display = 'none';
            gameScreen.style.display = 'block';

            // 位置情報の取得開始
            startGeolocation();
            
            // コンパス（デバイスの向き）の取得開始
            window.addEventListener('deviceorientation', handleOrientation, true);
        });

        function startGeolocation() {
            if (!navigator.geolocation) {
                alert('このブラウザは位置情報に対応していません。');
                return;
            }

            navigator.geolocation.watchPosition(
                (position) => {
                    currentLat = position.coords.latitude;
                    currentLng = position.coords.longitude;

                    // 距離の計算
                    const distance = calculateDistance(currentLat, currentLng, TREASURE_LAT, TREASURE_LNG);
                    distanceDisplay.innerText = Math.round(distance) + ' m';

                    // 宝の方角の計算
                    targetBearing = calculateBearing(currentLat, currentLng, TREASURE_LAT, TREASURE_LNG);
                    targetBearingDisplay.innerText = Math.round(targetBearing);
                },
                (error) => {
                    console.warn('位置情報の取得エラー:', error.message);
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        function handleOrientation(event) {
            if (currentLat === null) return; // 位置情報がまだない場合は無視

            let heading = null;

            // iOS (webkitCompassHeading) と Android (alpha) の違いを吸収
            if (event.webkitCompassHeading) {
                heading = event.webkitCompassHeading; // iOS
            } else if (event.alpha !== null) {
                // Android (簡易的な変換、機種により精度に差があります)
                heading = 360 - event.alpha;
            }

            if (heading === null) return;
            headingDisplay.innerText = Math.round(heading);

            // 宝の方向とスマホの向きの差を計算
            let diff = Math.abs(heading - targetBearing);
            if (diff > 180) {
                diff = 360 - diff;
            }

            // 誤差±20度以内なら反応させる
            if (diff <= 20) {
                document.body.classList.add('found-direction');
                messageDisplay.innerText = "✨ こっちだ！ ✨";
            } else {
                document.body.classList.remove('found-direction');
                messageDisplay.innerText = "宝の方向を探せ！";
            }
        }

        // 2点間の距離を計算する関数 (ハヴァーサイン公式)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // 地球の半径 (メートル)
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;

            const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // 2点間の方位角を計算する関数
        function calculateBearing(lat1, lon1, lat2, lon2) {
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const λ1 = lon1 * Math.PI / 180;
            const λ2 = lon2 * Math.PI / 180;
            const y = Math.sin(λ2 - λ1) * Math.cos(φ2);
            const x = Math.cos(φ1) * Math.sin(φ2) -
                      Math.sin(φ1) * Math.cos(φ2) * Math.cos(λ2 - λ1);
            let θ = Math.atan2(y, x);
            let bearing = (θ * 180 / Math.PI + 360) % 360;
            return bearing;
        }
    </script>
</body>
</html>
