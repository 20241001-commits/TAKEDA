<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝探しレーダー</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            color: white;
            transition: background-color 0.1s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
        }
        #start-screen, #game-screen {
            padding: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .big-text {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }
        /* 宝の方向を向いた時の背景色 */
        .found-direction {
            background-color: #f1c40f !important; /* ゴールド */
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>クエストスタート</h2>
        <p>位置情報とコンパスを使用します</p>
        <button id="start-btn">ゲーム開始</button>
    </div>

    <div id="game-screen" style="display: none;">
        <h2>クイズレーダー</h2>
        <div id="message" class="big-text">クエストの方向を探せ！</div>
    </div>

    <script>
        // クエストの座標リスト（いくつでも追加可能）
        const TREASURES = [
            { lat: 35.6263, lng: 139.6338 },
            { lat: 35.625839, lng: 139.637095 },
            { lat: 35.6327, lng: 139.8805 }
        ];

        let currentLat = null;
        let currentLng = null;

        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const messageDisplay = document.getElementById('message');

        startBtn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState !== 'granted') {
                        alert('コンパスの使用が許可されませんでした。');
                        return;
                    }
                } catch (error) {
                    console.error(error);
                }
            }

            startScreen.style.display = 'none';
            gameScreen.style.display = 'block';

            startGeolocation();
            window.addEventListener('deviceorientation', handleOrientation, true);
        });

        function startGeolocation() {
            if (!navigator.geolocation) {
                alert('このブラウザは位置情報に対応していません。');
                return;
            }

            navigator.geolocation.watchPosition(
                (position) => {
                    currentLat = position.coords.latitude;
                    currentLng = position.coords.longitude;
                },
                (error) => {
                    console.warn('位置情報の取得エラー:', error.message);
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        function handleOrientation(event) {
            if (currentLat === null) return;

            let heading = null;

            if (event.webkitCompassHeading) {
                heading = event.webkitCompassHeading;
            } else if (event.alpha !== null) {
                heading = 360 - event.alpha;
            }

            if (heading === null) return;

            let isLookingAtTreasure = false;

            // 全ての宝の方向を順番にチェックする
            TREASURES.forEach(treasure => {
                let bearing = calculateBearing(currentLat, currentLng, treasure.lat, treasure.lng);
                let diff = Math.abs(heading - bearing);
                if (diff > 180) {
                    diff = 360 - diff;
                }
                
                // いずれかの宝の方向に±2度以内で向いていたらフラグを立てる
                if (diff <= 2) {
                    isLookingAtTreasure = true;
                }
            });

            // どれか1つの宝の方を向いていれば光らせる
            if (isLookingAtTreasure) {
                document.body.classList.add('found-direction');
                messageDisplay.innerText = "✨ ドンピシャ！ ✨";
            } else {
                document.body.classList.remove('found-direction');
                messageDisplay.innerText = "宝の方向を探せ！";
            }
        }

        // 2点間の方位角を計算する関数
        function calculateBearing(lat1, lon1, lat2, lon2) {
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const λ1 = lon1 * Math.PI / 180;
            const λ2 = lon2 * Math.PI / 180;
            const y = Math.sin(λ2 - λ1) * Math.cos(φ2);
            const x = Math.cos(φ1) * Math.sin(φ2) -
                      Math.sin(φ1) * Math.cos(φ2) * Math.cos(λ2 - λ1);
            let θ = Math.atan2(y, x);
            let bearing = (θ * 180 / Math.PI + 360) % 360;
            return bearing;
        }
    </script>
</body>
</html>
