<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ターゲットコンパス（デバッグ版）</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background-color: #222;
      color: #fff;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    #start-btn {
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 20px;
    }
    #compass-container {
      position: relative;
      width: 250px;
      height: 250px;
      border-radius: 50%;
      border: 5px solid #fff;
      background-color: #333;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }
    #arrow {
      font-size: 80px;
      position: absolute;
      transform-origin: center center;
      transition: transform 0.1s ease-out;
    }
    #info, #debug {
      margin-top: 20px;
      font-size: 14px;
      line-height: 1.6;
      display: none;
      width: 100%;
      max-width: 300px;
      text-align: left;
    }
    #debug {
      color: #ff9999;
      background: rgba(255,0,0,0.1);
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <h2>目的地案内コンパス</h2>
  <button id="start-btn">コンパスを起動する</button>

  <div id="compass-container">
    <div id="arrow">⬆️</div>
  </div>

  <div id="info">
    【目的地】<br>北緯: 35.6263<br>東経: 139.6338<br><br>
    【現在地からの距離】<br><span id="distance">GPS取得中...</span> km
  </div>

  <div id="debug">
    </div>

  <script>
    // 目的地の座標
    const TARGET_LAT = 35.6263;
    const TARGET_LNG = 139.6338;

    let currentLat = null;
    let currentLng = null;
    let currentHeading = null;
    let targetBearing = null;

    const startBtn = document.getElementById('start-btn');
    const compassContainer = document.getElementById('compass-container');
    const arrow = document.getElementById('arrow');
    const info = document.getElementById('info');
    const distanceSpan = document.getElementById('distance');
    const debugDiv = document.getElementById('debug');

    // デバッグメッセージを表示する関数
    function logError(msg) {
      debugDiv.style.display = 'block';
      debugDiv.innerHTML += `・${msg}<br>`;
    }

    startBtn.addEventListener('click', async () => {
      debugDiv.innerHTML = ''; // エラーリセット
      
      // 1. センサー（デバイスの向き）の許可リクエスト (iOS 13+ 対応)
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission !== 'granted') {
            logError('センサーの利用が拒否されました。設定からSafariのモーションセンサーをオンにしてください。');
            return;
          }
        } catch (error) {
          logError('センサーの許可リクエストに失敗しました（HTTPS通信ではない可能性があります）。');
          return;
        }
      }

      // UI表示切り替え
      startBtn.style.display = 'none';
      compassContainer.style.display = 'flex';
      info.style.display = 'block';

      // センサーの値を取得開始
      window.addEventListener('deviceorientation', handleOrientation, true);

      // 2. 位置情報（GPS）の取得開始
      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
          updatePosition,
          (err) => { 
            let errMsg = '位置情報エラー: ' + err.message;
            if (err.code === 1) errMsg = '位置情報の利用が拒否されました。スマホの設定を確認してください。';
            if (err.code === 2) errMsg = '電波状況が悪く、位置が特定できません。';
            logError(errMsg);
          },
          { enableHighAccuracy: true, maximumAge: 0 }
        );
      } else {
        logError('このブラウザはGPSに対応していません。');
      }
    });

    // デバイスの向きを処理する
    function handleOrientation(event) {
      if (event.webkitCompassHeading) {
        currentHeading = event.webkitCompassHeading; // iOS用
      } else if (event.alpha !== null) {
        currentHeading = 360 - event.alpha; // Android用
      } else {
        logError('コンパスのセンサー値が取得できません。');
      }
      updateCompass();
    }

    // 現在地が更新されたときの処理
    function updatePosition(position) {
      currentLat = position.coords.latitude;
      currentLng = position.coords.longitude;
      
      targetBearing = calculateBearing(currentLat, currentLng, TARGET_LAT, TARGET_LNG);
      const distance = calculateDistance(currentLat, currentLng, TARGET_LAT, TARGET_LNG);
      
      distanceSpan.textContent = distance.toFixed(3);
      updateCompass();
    }

    // コンパスの針を回転させる
    function updateCompass() {
      if (currentHeading !== null && targetBearing !== null) {
        let rotation = targetBearing - currentHeading;
        arrow.style.transform = `rotate(${rotation}deg)`;
      }
    }

    // 2点間の方位を計算
    function calculateBearing(lat1, lng1, lat2, lng2) {
      const toRad = Math.PI / 180;
      const toDeg = 180 / Math.PI;
      const rLat1 = lat1 * toRad;
      const rLat2 = lat2 * toRad;
      const dLng = (lng2 - lng1) * toRad;
      const y = Math.sin(dLng) * Math.cos(rLat2);
      const x = Math.cos(rLat1) * Math.sin(rLat2) - Math.sin(rLat1) * Math.cos(rLat2) * Math.cos(dLng);
      const bearing = Math.atan2(y, x) * toDeg;
      return (bearing + 360) % 360;
    }

    // 2点間の距離(km)を計算
    function calculateDistance(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng/2) * Math.sin(dLng/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }
  </script>
</body>
</html>
